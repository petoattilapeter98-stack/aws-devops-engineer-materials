<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glass Village — Day/Night</title>

  <!-- ✅ Real stylesheet tag (NOT plain text) -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- FX overlay -->
  <canvas id="fx" aria-hidden="true"></canvas>

  <div class="scene" id="scene">
    <div class="vignette" aria-hidden="true"></div>

    <div class="glow glow-1" aria-hidden="true"></div>
    <div class="glow glow-2" aria-hidden="true"></div>

    <!-- Parallax layers -->
    <div class="layer sky" data-depth="0.02" aria-hidden="true"></div>
    <div class="layer stars" data-depth="0.04" aria-hidden="true"></div>

    <!-- Time Widget -->
    <div class="time-widget" id="timeWidget">
      <div class="time-display" id="timeDisplay">00:00:00</div>
      <div class="date-display" id="dateDisplay">January 1, 2026</div>
      <div class="weather-info" id="weatherInfo">Rain: On | Fog: On</div>
    </div>

    <!-- Minimal HUD -->
    <main class="hud">
      <header class="top">
        <div class="brand">
          <span class="dot"></span>
          <span class="brand-title">Glass Village</span>
        </div>

        <div class="chips">
          <button class="chip" id="toggleRain" type="button">Rain: On</button>
          <button class="chip" id="toggleFog" type="button">Fog: On</button>
        </div>
      </header>

      <footer class="footer">
        <span class="hint">Move your mouse — parallax + weather react subtly.</span>
        <a class="mini-link" href="/health" target="_blank" rel="noopener">Health Check</a>
      </footer>
    </main>
  </div>

  <!-- ✅ Real script tag (NOT plain text). defer ensures DOM is ready -->
  <script src="app.js" defer></script>
</body>
</html>
